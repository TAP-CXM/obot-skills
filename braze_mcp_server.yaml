name: Braze MCP Server
serverUserType: singleUser
shortDescription: Governed Braze REST API access for campaigns, Canvases, templates, users, and catalog data.
description: |
  A governed Braze MCP server for operational campaign workflows.

  ## Features

  - Read campaign, Canvas, segment, template, subscription, and catalog metadata.
  - Trigger campaigns, send messages, update users, duplicate Braze objects, and create templates only when calls include explicit confirmation.
  - Keep Braze credentials in Obot-managed environment configuration rather than committed files.

  ## What you'll need to connect

  **Required:**

  - **Braze REST Endpoint**: Your workspace REST endpoint, for example `https://rest.iad-01.braze.com`.
  - **Braze API Key**: A Braze REST API key with only the permissions needed for the tools you intend to use.

  **Optional:**

  - **Default App ID**: Used by payloads that need a default app context.
  - **Allow Generic Request**: Set to `true` only in trusted admin/debug environments.
metadata:
  categories: CRM, SaaS & API Integrations, Automation
icon: https://avatars.githubusercontent.com/u/7359361?s=200&v=4
repoURL: https://github.com/TAP-CXM/obot-skills
env:
  - key: BRAZE_REST_ENDPOINT
    name: Braze REST Endpoint
    required: true
    sensitive: false
    description: Your Braze REST endpoint, for example https://rest.iad-01.braze.com.
  - key: BRAZE_API_KEY
    name: Braze API Key
    required: true
    sensitive: true
    description: Braze REST API key with the minimum permissions needed for the enabled workflows.
  - key: BRAZE_DEFAULT_APP_ID
    name: Braze Default App ID
    required: false
    sensitive: false
    description: Optional default app identifier for payloads that need app context.
  - key: BRAZE_DEFAULT_EMAIL_FROM
    name: Braze Default Email Sender
    required: false
    sensitive: false
    description: Optional Braze-approved sender for proof/API-only email sends, for example Team <team@example.com>.
  - key: BRAZE_ALLOW_GENERIC_REQUEST
    name: Allow Generic Request
    required: false
    sensitive: false
    description: Set to true only for trusted admin/debug environments.
runtime: uvx
uvxConfig:
  package: 'git+https://github.com/TAP-CXM/obot-skills.git#subdirectory=Braze/MCP/braze-mcp-server'
  command: braze-mcp-server
  startupTimeoutSeconds: 120
toolPreview:
  - name: braze_health
    description: Check MCP server configuration without exposing secrets.
    params: {}
  - name: braze_list_campaigns
    description: List Braze campaigns, optionally filtered by page, archive status, sort direction, or modified date.
    params:
      page: Optional page number.
      include_archived: Whether archived campaigns should be included.
      sort_direction: Sort direction, either asc or desc.
      modified_after: Optional modified-after timestamp.
  - name: braze_rank_campaigns_by_performance
    description: Rank campaigns by performance; use for best performing campaign. Defaults to open_rate when no metric is specified.
    params:
      metric: Performance metric, one of open_rate, click_rate, conversion_rate, opens, clicks, conversions, or sends.
      length: Number of days for the campaign analytics window.
      ending_at: Optional analytics end timestamp.
      page: Optional campaign-list page number.
      include_archived: Whether archived campaigns should be included.
      sort_direction: Optional campaign-list sort direction, either asc or desc.
      modified_after: Optional modified-after timestamp.
      limit: Number of ranked campaigns to return.
  - name: braze_get_campaign_analytics
    description: Get campaign time-series analytics for a known campaign_id.
    params:
      campaign_id: Braze campaign API identifier.
      length: Number of days for the campaign analytics window.
      ending_at: Optional analytics end timestamp.
  - name: braze_list_segment_sizes
    description: List Braze segments/audiences with latest sizes; use for largest segment or audience-size inventory.
    params:
      length: Number of days for the size analytics window.
      page: Optional segment-list page number.
      sort_direction: Optional segment-list sort direction, either asc or desc.
      ending_at: Optional analytics end timestamp.
      max_segments: Maximum number of segments to enrich with analytics.
  - name: braze_count_users
    description: Count users through saved Braze segment analytics; use for total user counts or saved-segment/filter count questions.
    params:
      query: Natural-language count request or filter text, for example "how many users are in Braze" or "users named Dirk".
      segment_id: Optional Braze Segment API identifier when known.
      segment_name: Optional saved segment name when known.
      length: Number of days for the segment analytics window.
      ending_at: Optional analytics end timestamp.
      max_segments: Maximum number of segments to inspect for matching.
  - name: braze_get_campaign_details
    description: Get metadata and message details for a campaign.
    params:
      campaign_id: Braze campaign API identifier.
      post_launch_draft_version: Whether to retrieve the post-launch draft version.
  - name: braze_list_canvases
    description: List Braze Canvases.
    params:
      page: Optional page number.
      include_archived: Whether archived Canvases should be included.
      sort_direction: Sort direction, either asc or desc.
      modified_after: Optional modified-after timestamp.
  - name: braze_trigger_campaign
    description: Trigger an API campaign. Requires confirmed=true after human approval.
    params:
      campaign_id: Braze campaign API identifier.
      recipients: Recipient list.
      audience: Audience object.
      broadcast: Whether to broadcast to the full target audience.
      trigger_properties: Optional trigger properties.
      confirmed: Must be true after approval.
  - name: braze_send_messages
    description: Send an API-defined message. Requires confirmed=true after human approval.
    params:
      messages: Message payload object.
      external_user_ids: External user IDs to send to.
      user_aliases: User aliases to send to.
      recipients: Recipient list.
      audience: Audience object.
      segment_id: Optional segment identifier.
      broadcast: Whether to broadcast to the full target audience.
      override_frequency_capping: Whether to ignore frequency capping.
      recipient_subscription_state: Recipient subscription state, one of opted_in, subscribed, or all.
      confirmed: Must be true after approval.
  - name: braze_send_proof_email
    description: Send an API-only proof email to one email address, creating the email alias user first if needed. Requires confirmed=true after human approval.
    params:
      to_email: Recipient email address.
      subject: Email subject line.
      body: Valid HTML email body.
      from_email: Optional Braze-approved sender; uses BRAZE_DEFAULT_EMAIL_FROM when omitted.
      app_id: Optional Braze app ID; uses BRAZE_DEFAULT_APP_ID when omitted.
      plaintext_body: Optional plaintext body.
      preheader: Optional email preheader.
      reply_to: Optional reply-to address.
      campaign_id: Optional API campaign ID for tracking.
      message_variation_id: Optional message variation ID.
      send_id: Optional send ID.
      alias_label: Alias label for email-based recipients.
      create_user_first: Whether to create/update the email alias user before sending.
      recipient_subscription_state: Recipient subscription state, one of opted_in, subscribed, or all.
      confirmed: Must be true after approval.
  - name: braze_users_track
    description: Track user attributes, events, or purchases. Requires confirmed=true after human approval.
    params:
      attributes: Attribute objects.
      events: Event objects.
      purchases: Purchase objects.
      confirmed: Must be true after approval.
  - name: braze_create_user
    description: Create or update a Braze user profile by email, using an alias when no external_id is provided. Requires confirmed=true after human approval.
    params:
      email: User email address.
      external_id: Optional external user ID.
      user_alias: Optional user alias object.
      alias_label: Alias label to use when creating an email alias.
      attributes: Optional additional user attributes.
      confirmed: Must be true after approval.
