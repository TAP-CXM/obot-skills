$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Customer Journey Playbook Recommendation"
type: object
required:
  - problem
  - recommendations
properties:
  problem:
    type: object
    required:
      - summary
      - lifecycle_stage
      - primary_kpi
    properties:
      summary:
        type: string
      lifecycle_stage:
        type: string
      customer_barrier:
        type: string
      primary_kpi:
        type: string
  recommendations:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - priority
        - journey
        - rationale
        - trigger
        - audience
        - channels
        - kpi
      properties:
        priority:
          type: integer
        journey:
          type: string
        rationale:
          type: string
        trigger:
          type: string
        audience:
          type: string
        channels:
          type: array
          items:
            type: string
        timing:
          type: string
        kpi:
          type: string
        dependencies:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
  next_steps:
    type: array
    items:
      type: string
  refinement_questions:
    type: array
    description: "Focused follow-up questions that would materially improve the recommendation or journey design."
    minItems: 1
    maxItems: 5
    items:
      type: string
additionalProperties: false
